name: Dedupe Pending Nodes

on:
  schedule:
    - cron: '0 2,8,14,20 * * *'  # Every 6 hours (UTC) -> 7:30 AM, 1:30 PM, 7:30 PM, 1:30 AM IST
  workflow_dispatch:

jobs:
  dedupe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Validate secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          for secret in "$SUPABASE_URL" "$SUPABASE_SERVICE_ROLE_KEY"; do
            if [ -z "$secret" ]; then
              echo "❌ Missing required secrets"
              exit 1
            fi
          done
          echo "✅ Secrets present"
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install Dependencies
        run: pip install -r requirements.txt
      
      - name: Run Dedupe Pending
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m core.skills.dedupe_pending
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "⚠️ Dedupe Pending FAILED at $(date)"
          echo "Check logs: https://github.com/Crayon-Biz-LLP/integrated-os/actions"
