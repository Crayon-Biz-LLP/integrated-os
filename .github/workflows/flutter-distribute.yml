name: Flutter — Build & Distribute

on:
  push:
    branches: [main]
    paths: ['rhodey_app/**']   # Only trigger when Flutter code changes
  workflow_dispatch:            # Allow manual trigger too

jobs:
  distribute:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: rhodey_app

      - name: Run analyzer
        run: flutter analyze
        working-directory: rhodey_app

      - name: Build APK (debug — no signing key needed for Firebase testing)
        run: flutter build apk --debug
        working-directory: rhodey_app

      - name: Distribute to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:40716548335:android:a1138ac8dcc9639458431a
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: rhodey_app/build/app/outputs/flutter-apk/app-debug.apk
