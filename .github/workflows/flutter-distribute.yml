name: Flutter — Build & Distribute

on:
  push:
    branches: [main]
    paths: ['rhodey_app/**']   # Only trigger when Flutter code changes
  workflow_dispatch:            # Allow manual trigger too

jobs:
  distribute:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full git history needed for accurate version code

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: rhodey_app

      - name: Run analyzer
        run: flutter analyze
        working-directory: rhodey_app

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > rhodey_app/android/app/upload-keystore.jks

      - name: Write Firebase config
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > rhodey_app/android/app/google-services.json

      - name: Compute auto-version from git history
        id: version
        run: |
          VERSION_NAME=$(grep '^version: ' rhodey_app/pubspec.yaml | sed 's/version: *//' | sed 's/+.*//')
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Using version $VERSION_NAME (build $VERSION_CODE)"

      - name: Build APK (release — signed, auto-versioned)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
        run: |
          flutter build apk --release \
            --build-name="$VERSION_NAME" \
            --build-number="$VERSION_CODE"
        working-directory: rhodey_app

      - name: Distribute to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:40716548335:android:a1138ac8dcc9639458431a
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: rhodey_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload APK to GitHub Releases — version-specific tag (for in-app updates)
        id: upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
        run: |
          TAG="app-v${VERSION_NAME}+${VERSION_CODE}"
          NOTES="Automated build from main branch (${GITHUB_SHA::7})"
          gh release create "$TAG" \
            --title "Rhodey App v${VERSION_NAME} (build ${VERSION_CODE})" \
            --notes "$NOTES" \
            rhodey_app/build/app/outputs/flutter-apk/app-release.apk
          echo "download_url=https://github.com/Crayon-Biz-LLP/integrated-os/releases/download/$TAG/app-release.apk" >> $GITHUB_OUTPUT

      - name: Record version in Supabase (for in-app update checks)
        id: record_version
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          DOWNLOAD_URL: ${{ steps.upload.outputs.download_url }}
        run: |
          RELEASE_NOTES="Automated build from main branch (${GITHUB_SHA:0:7})"
          export VERSION_NAME VERSION_CODE DOWNLOAD_URL RELEASE_NOTES
          python3 scripts/record_app_version.py
