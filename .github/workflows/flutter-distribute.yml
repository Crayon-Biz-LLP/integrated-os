name: Flutter — Build & Distribute

on:
  push:
    branches: [main]
    paths: ['rhodey_app/**']   # Only trigger when Flutter code changes
  workflow_dispatch:            # Allow manual trigger too

jobs:
  distribute:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: rhodey_app

      - name: Run analyzer
        run: flutter analyze
        working-directory: rhodey_app

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > rhodey_app/android/app/upload-keystore.jks

      - name: Write Firebase config
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > rhodey_app/android/app/google-services.json

      - name: Build APK (release — signed for consistent updates)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release
        working-directory: rhodey_app

      - name: Distribute to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:40716548335:android:a1138ac8dcc9639458431a
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: rhodey_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload APK to GitHub Releases (for in-app updates)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION_NAME=$(grep '^version: ' rhodey_app/pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          VERSION_CODE=$(grep '^version: ' rhodey_app/pubspec.yaml | sed 's/.*+//')
          TAG="app-v${VERSION_NAME}+${VERSION_CODE}"
          NOTES="Automated build from main branch (${GITHUB_SHA::7})"
          gh release delete app-latest --yes 2>/dev/null || true
          git tag -d app-latest 2>/dev/null || true
          git push origin :refs/tags/app-latest 2>/dev/null || true
          gh release create app-latest \
            --title "Rhodey App v${VERSION_NAME} (build ${VERSION_CODE})" \
            --notes "$NOTES" \
            rhodey_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Record version in Supabase (for in-app update checks)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          export VERSION_NAME=$(grep '^version: ' rhodey_app/pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          export VERSION_CODE=$(grep '^version: ' rhodey_app/pubspec.yaml | sed 's/.*+//')
          export DOWNLOAD_URL="https://github.com/Crayon-Biz-LLP/integrated-os/releases/download/app-latest/app-release.apk"
          export RELEASE_NOTES="Automated build from main branch (${GITHUB_SHA::7})"

          python3 << 'PYEOF'
import os, json, urllib.request

payload = json.dumps({
    'key': 'app_version',
    'content': json.dumps({
        'version_code': int(os.environ['VERSION_CODE']),
        'version_name': os.environ['VERSION_NAME'],
        'download_url': os.environ['DOWNLOAD_URL'],
        'release_notes': os.environ.get('RELEASE_NOTES', ''),
    })
}).encode()

req = urllib.request.Request(
    os.environ['SUPABASE_URL'] + '/rest/v1/core_config',
    data=payload,
    headers={
        'apikey': os.environ['SUPABASE_SERVICE_ROLE_KEY'],
        'Authorization': 'Bearer ' + os.environ['SUPABASE_SERVICE_ROLE_KEY'],
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates',
    }
)
urllib.request.urlopen(req)
print('✅ Recorded version in Supabase')
PYEOF
