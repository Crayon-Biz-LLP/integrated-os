name: Weekly Maintenance — Orphan Cleanup + Memory Clustering

on:
  schedule:
    # Weekly on Sunday at 3 AM UTC (8:30 AM IST)
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          for secret in "$SUPABASE_URL" "$SUPABASE_SERVICE_ROLE_KEY" "$GEMINI_API_KEY"; do
            if [ -z "$secret" ]; then
              echo "❌ One or more required secrets are missing"
              exit 1
            fi
          done
          echo "✅ All secrets present"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Step 1 — Orphan Cleanup
        id: cleanup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🧹 Running orphan cleanup..."
          python -m core.agents.cleanup_orphans --yes 2>&1 | tail -10
          echo "✅ Orphan cleanup complete"

      - name: Step 2 — Memory Clustering (M5)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: python scripts/run_memory_clusters.py

  notify_failure:
    runs-on: ubuntu-latest
    needs: weekly
    if: failure()
    steps:
      - name: Notify on failure
        run: |
          echo "⚠️ Weekly Maintenance FAILED at $(date)"
          echo "Check logs: https://github.com/${{ github.repository }}/actions"
