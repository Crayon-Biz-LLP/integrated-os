name: Concept Sweep (Weekly)

on:
  schedule:
    # Weekly on Saturday at 4 AM UTC (9:30 AM IST)
    - cron: '0 4 * * 6'
  workflow_dispatch:

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          for secret in "$SUPABASE_URL" "$SUPABASE_SERVICE_ROLE_KEY" "$GEMINI_API_KEY"; do
            if [ -z "$secret" ]; then
              echo "❌ One or more required secrets are missing"
              exit 1
            fi
          done
          echo "✅ All secrets present"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Concept Sweep
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
        run: python scripts/concept_sweep_batch.py

  notify_failure:
    runs-on: ubuntu-latest
    needs: sweep
    if: failure()
    steps:
      - name: Notify on failure
        run: |
          echo "⚠️ Concept Sweep FAILED at $(date)"
          echo "Check logs: https://github.com/${{ github.repository }}/actions"
