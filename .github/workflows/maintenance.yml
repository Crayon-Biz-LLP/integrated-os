name: System Maintenance

on:
  schedule:
    # Standard mode every 30 min (index queue + raw dump cleanup + orphan sweep)
    - cron: '*/30 * * * *'
    # Daily at 3 AM UTC (full daily sweep)
    - cron: '0 3 * * *'
    # Weekly on Sunday at 4 AM UTC (full weekly housekeeping)
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Maintenance mode (standard, daily, weekly)'
        required: true
        default: 'standard'

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Determine Mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            # Scheduled: detect which cron based on hour
            HOUR=$(date -u +%H)
            DAY=$(date -u +%u)
            if [ "$HOUR" = "04" ] && [ "$DAY" = "7" ]; then
              echo "mode=weekly" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "03" ]; then
              echo "mode=daily" >> $GITHUB_OUTPUT
            else
              echo "mode=standard" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Validate secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
        run: |
          for secret in "$SUPABASE_URL" "$SUPABASE_SERVICE_ROLE_KEY" "$GEMINI_API_KEY"; do
            if [ -z "$secret" ]; then
              echo "❌ Missing required secrets"
              exit 1
            fi
          done
          echo "✅ Secrets present"

      - name: Run Maintenance (${{ steps.mode.outputs.mode }})
        id: run
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          RETRIEVAL_INDEXING_ENABLED: "true"
        run: python scripts/run_maintenance.py "${{ steps.mode.outputs.mode }}" 2>&1 | tail -30

  notify_failure:
    runs-on: ubuntu-latest
    needs: maintenance
    if: failure()
    steps:
      - name: Notify on failure
        run: |
          echo "⚠️ System Maintenance FAILED at $(date)"
          echo "Check logs: https://github.com/${{ github.repository }}/actions"
