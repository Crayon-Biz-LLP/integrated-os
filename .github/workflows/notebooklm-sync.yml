name: Notebook LM — Auto-Sync Codebase

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install \
            google-api-python-client \
            google-auth-httplib2 \
            google-auth-oauthlib

      - name: Generate .md Source Bundles
        run: python3 scripts/generate_notebooklm_sources.py

      - name: Sync to Google Docs
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python3 scripts/sync_notebooklm_docs.py

      - name: Report Status
        if: always()
        run: |
          echo "Notebook LM sync complete."
          echo "Google Docs updated in drive://NotebookLM Codebase Sources/"
          echo "Notebook LM auto-syncs within minutes."
