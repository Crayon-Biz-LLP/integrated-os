name: Pulse Engine (Bulk Operations)

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'Operation to run'
        required: true
        type: choice
        options:
          - bulk-archive-sync
          - backfill-graph

jobs:
  run-bulk-operation: # Renamed for clarity
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Selected Operation
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PULSE_SECRET: ${{ secrets.PULSE_SECRET }}
        run: |
          if [ "${{ github.event.inputs.operation }}" == "bulk-archive-sync" ]; then
            echo "Launching Archive Ingest..."
            python core/skills/archive_ingest.py
          elif [ "${{ github.event.inputs.operation }}" == "backfill-graph" ]; then
            echo "Launching Graph Backfill..."
            python core/skills/backfill_graph.py
          fi