name: Pulse Engine (Bulk Operations)

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'Operation to run'
        required: true
        type: choice
        options:
          - bulk-archive-sync

jobs:
  bulk-archive-sync:
    # Only run if the correct operation is selected
    if: github.event.inputs.operation == 'bulk-archive-sync'
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Ingesting a large CSV takes time
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Archive Ingest
        env:
          # Supabase Connectivity
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          
          # Extraction Intelligence (REQUIRED)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
          # Feedback & Sync
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PULSE_SECRET: ${{ secrets.PULSE_SECRET }}
          
        run: python core/skills/archive_ingest.py