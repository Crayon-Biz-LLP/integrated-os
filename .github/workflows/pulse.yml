name: Pulse Cron
on:
  schedule:
    # WEEKDAYS (Mon-Fri)
    # Runs at: 03:30, 06:30, 10:30, 13:30 UTC matches 9AM, 12PM, 4PM, 7PM IST
    - cron: '30 3,6,10,13 * * 1-5'
    
    # WEEKENDS (Sat-Sun)
    # Runs at: 10:00, 15:00 IST
    - cron: '30 4,9 * * 0,6'
  workflow_dispatch:  # Manual test button

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Gemini safe
    steps:
    - name: Trigger Vercel Pulse (Python Engine)
      run: |
        curl -f -s -w "\nHTTP Status: %{http_code}" -X POST \
          https://integrated-os.vercel.app/api/pulse \
          -H "x-pulse-secret: ${{ secrets.PULSE_SECRET }}" \
          -H "Content-Length: 0"