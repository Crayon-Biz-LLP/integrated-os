name: Pulse Engine (Rhodey SITREP)
on:
  schedule:
    - cron: '30 3,6,10,13 * * 1-5' # Weekdays IST: 9AM, 12PM, 4PM, 7PM
    - cron: '30 4,9 * * 0,6'       # Weekends IST: 10AM, 3PM
  workflow_dispatch:              # Manual trigger button in GitHub
  repository_dispatch:            # Allows Vercel to trigger this
    types: [trigger_pulse]

jobs:
  run-pulse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Execute Rhodey SITREP
        env:
          # You MUST add these to GitHub Settings > Secrets > Actions
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          PULSE_SECRET: ${{ secrets.PULSE_SECRET }}
        run: python core/pulse_cli.py