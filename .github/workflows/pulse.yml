name: Pulse Engine (Rhodey SITREP)
on:
  schedule:
    - cron: '30 23 * * 1-5'
    - cron: '0 2,6,9,12 * * 1-5'
    - cron: '30 2,9 * * 0,6'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger_pulse]

jobs:
  run-pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          for secret in "$SUPABASE_URL" "$SUPABASE_SERVICE_ROLE_KEY" "$GEMINI_API_KEY" "$TELEGRAM_BOT_TOKEN" "$GOOGLE_REFRESH_TOKEN"; do
            if [ -z "$secret" ]; then
              echo "❌ One or more required secrets are missing"
              exit 1
            fi
          done
          echo "✅ All secrets present"

      - name: "Guard: no unversioned content updates on memories"
        run: |
          # DB triggers now handle memory versioning (version_memory_for_update removed intentionally).
          # Only flag updates that change content fields (content, memory_type, embedding, etc).
          # expires_at-only updates are fine (metadata field, DB trigger handles archive).
          BAD=$(grep -rn "\.table('memories')\.update({" \
            --include="*.py" \
            . | grep -E "'(content|memory_type|embedding|source)'" || true)
          if [ -n "$BAD" ]; then
            echo "❌ Inline memories.update({...}) changes content fields without versioning guard:"
            echo "$BAD"
            echo "Only expires_at-only updates are OK (DB triggers handle versioning)."
            exit 1
          fi
          echo "✅ No unversioned content updates on memories found"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: "Step 1: Ingest New Journal Entries"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
        run: python -m core.skills.archive_ingest

      - name: "Step 2: Update Neural Graph (Link Memories)"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
        run: python -m core.skills.backfill_graph

      - name: "Step 3: Execute Rhodey SITREP (The Briefing)"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          PULSE_SECRET: ${{ secrets.PULSE_SECRET }}
          OUTLOOK_CLIENT_ID: ${{ secrets.OUTLOOK_CLIENT_ID }}
          OUTLOOK_CLIENT_SECRET: ${{ secrets.OUTLOOK_CLIENT_SECRET }}
          OUTLOOK_REFRESH_TOKEN: ${{ secrets.OUTLOOK_REFRESH_TOKEN }}
          OUTLOOK_TENANT_ID: ${{ secrets.OUTLOOK_TENANT_ID }}
          OUTLOOK_SCOPES: ${{ secrets.OUTLOOK_SCOPES }}
        run: python -m core.pulse_cli

  notify_failure:
    runs-on: ubuntu-latest
    needs: run-pulse
    if: failure()
    steps:
      - name: Notify on failure
        run: |
          echo "⚠️ Rhodey SITREP FAILED at $(date)"
          echo "Check logs: https://github.com/Crayon-Biz-LLP/integrated-os/actions"